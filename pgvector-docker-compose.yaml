services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: jackclaw_memory
      POSTGRES_USER: jackclaw
      POSTGRES_PASSWORD: jackclaw123
    ports:
      - "5432:5432"
    volumes:
      # 💡 核心点：schema.sql 放在 initdb 目录，容器首次启动时自动执行
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      # 数据持久化：关闭容器后数据不丢失
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jackclaw -d jackclaw_memory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data: