# ============================================
# JackClaw 配置文件示例
# ============================================
# 复制此文件为 config.yaml 并填写实际值

# 工作区配置
workspace:
  id: "jack-claw"
  name: "JackClaw 工作助手"
  data_dir: "./data"

# 飞书配置
# 环境变量: FEISHU_APP_ID, FEISHU_APP_SECRET
feishu:
  app_id: "cli_a95ed6ab497bdbc9"
  app_secret: "wIslvU0wYc2orEuoprNOgdI53xe1kCV5"
  # 可选：群消息白名单（不填则全部接收）
  allowed_chats: []
  # allowed_chats:
  #   - "oc_xxxxxxxxxxxxxxxx"
  #   - "oc_yyyyyyyyyyyyyyyy"

# Agent 配置
agent:
  # 模型选择: qwen-turbo / qwen-plus / qwen-max
  model: "qwen3-32b"#"qwen-plus"
  max_iter: 50
  # 环境变量: QWEN_API_KEY

# 会话配置
session:
  max_history_turns: 20

# 沙盒配置
sandbox:
  # MVP 本地执行
  # 改进: 接入 AIO-Sandbox (Docker MCP)
  url: "http://localhost:8022/mcp"
  timeout_s: 120

# Skills 配置
skills:
  # 本地 Skills 目录
  local_dir: "./jackclaw/skills"

# 调试配置
debug:
  enable_test_api: true
  test_api_host: "127.0.0.1"
  test_api_port: 9090
