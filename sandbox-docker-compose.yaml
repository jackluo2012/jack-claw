version: "3.8"
services:
  aio-sandbox:
    image: ghcr.io/agent-infra/sandbox:latest   # AIO-Sandbox MCP Server
    ports:
      - "8022:8080"    # Sandbox MCP 端点：http://localhost:8022/mcp
    environment:
      # 💡 核心点：凭证通过 env 注入沙盒，不经过 LLM
      QWEN_API_KEY: "${QWEN_API_KEY}"
      # pgvector 连接串（搜索记忆 Skill 在沙盒内写入）
      MEMORY_DB_DSN: "${MEMORY_DB_DSN:-}"
    volumes:
      # 💡 skills 目录改为读写，skill-creator Skill 可在沙盒内创建新 Skill
      - ./jackclaw/skills:/mnt/skills:rw
      # 整个 workspace 挂载为读写，session 文件在 /workspace/sessions/{sid}/
      - ./data/workspace:/workspace:rw
      # cron 配置目录单独挂载，scheduler_mgr Skill 可读写 tasks.json
      - ./data/cron:/workspace/cron:rw
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped